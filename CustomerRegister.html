<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Customer Registration | LadangLink</title>
    <link rel="stylesheet" href="LadangStyle.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="form-container">
        <h2>Create Customer Account</h2>
        <form action="CustomerRegister.php" method="POST">
            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Email Address</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Register as Customer</button>
        </form>
        <p>Already have an account? <a href="CustomerLogin.php">Login here</a></p>
        <p>Want to sell? <a href="Vendor.html">Join as Vendor</a></p>
    </div>
    <div id="footer"></div>
    <script>
        fetch("Navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
                let script = document.createElement('script');
                script.src = 'dropdown.js';
                document.body.appendChild(script);
            })
            .catch(err => console.error("Navbar load error:", err));

        fetch("Footer.html")
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data)
            .catch(err => console.error("Footer load error:", err));
    </script>
</body>

</html>
