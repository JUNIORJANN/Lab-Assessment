<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Login - LadangLink</title>
    <link rel="stylesheet" href="LadangStyle.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="form-container">
        <h2>Login to LadangLink</h2>
        <p><a href="VendorLogin.html">Vendor Login</a> | <a href="customer_login.php">Customer Login</a></p>
    </div>
    <div id="footer"></div>
    <script>
        fetch("Navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
                // Load dropdown.js dynamically after navbar is inserted
                let script = document.createElement('script');
                script.src = 'dropdown.js';
                document.body.appendChild(script);
            })
            .catch(err => console.error("Navbar load error:", err));

        fetch("Footer.html")
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data)
            .catch(err => console.error("Footer load error:", err));
    </script>
</body>

</html>
